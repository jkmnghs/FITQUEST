<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#1e3a5f" stroke-width="3"/>

  <!-- Dumbbell -->
  <g fill="url(#g)" filter="url(#glow)">
    <!-- Left outer plate -->
    <rect x="58"  y="156" width="52" height="200" rx="12"/>
    <!-- Left inner collar -->
    <rect x="110" y="208" width="30" height="96"  rx="7"/>
    <!-- Center bar -->
    <rect x="140" y="240" width="232" height="32" rx="8"/>
    <!-- Right inner collar -->
    <rect x="372" y="208" width="30" height="96"  rx="7"/>
    <!-- Right outer plate -->
    <rect x="402" y="156" width="52" height="200" rx="12"/>
  </g>
</svg>
