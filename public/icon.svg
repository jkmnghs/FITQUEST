<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#00c4c4"/>
      <stop offset="35%"  stop-color="#1460bb"/>
      <stop offset="100%" stop-color="#091e5a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffe566"/>
      <stop offset="40%"  stop-color="#ffd700"/>
      <stop offset="70%"  stop-color="#ffa000"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="warrior" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#ffc107"/>
      <stop offset="50%"  stop-color="#ff7c00"/>
      <stop offset="100%" stop-color="#e64a00"/>
    </linearGradient>
    <linearGradient id="shieldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#e64a00"/>
    </linearGradient>
    <linearGradient id="arcG" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b06000"/>
      <stop offset="50%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="clip"><rect width="512" height="512" rx="96" ry="96"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Teal radial glow top-left -->
    <ellipse cx="170" cy="140" rx="160" ry="130" fill="#00e5ff" opacity="0.13"/>

    <!-- Light ray streaks -->
    <g opacity="0.18" stroke="#b3e5fc" stroke-linecap="round">
      <line x1="256" y1="0"   x2="100" y2="512" stroke-width="55"/>
      <line x1="340" y1="0"   x2="256" y2="512" stroke-width="40"/>
      <line x1="420" y1="30"  x2="370" y2="512" stroke-width="30"/>
    </g>

    <!-- Orbit ring -->
    <ellipse cx="268" cy="275" rx="155" ry="150"
             fill="none" stroke="#4fc3f7" stroke-width="3.5" opacity="0.45"/>
    <path d="M 155 200 A 155 150 0 0 1 420 195"
          fill="none" stroke="#b3e5fc" stroke-width="4" opacity="0.55" stroke-linecap="round"/>

    <!-- Speed lines (left side) -->
    <g opacity="0.45" stroke="#90caf9" stroke-linecap="round">
      <line x1="50"  y1="230" x2="155" y2="215" stroke-width="5"/>
      <line x1="42"  y1="258" x2="152" y2="254" stroke-width="6"/>
      <line x1="48"  y1="286" x2="155" y2="286" stroke-width="5"/>
      <line x1="55"  y1="312" x2="158" y2="310" stroke-width="4"/>
    </g>

    <!-- Sweeping golden arc arrow -->
    <g filter="url(#drop)">
      <path d="M 72 408 Q 180 475 295 355 Q 365 278 405 182"
            fill="none" stroke="url(#arcG)" stroke-width="22" stroke-linecap="round" opacity="0.92"/>
      <!-- Arrowhead tip -->
      <polygon points="405,182 378,198 392,222" fill="#ffd700"/>
    </g>
    <!-- Arc glow -->
    <path d="M 72 408 Q 180 475 295 355 Q 365 278 405 182"
          fill="none" stroke="#ffe082" stroke-width="6" stroke-linecap="round" opacity="0.4"/>

    <!-- ── SHIELD ── -->
    <g transform="translate(190,264)" filter="url(#drop)">
      <path d="M 0,-70 L 66,-44 L 66,20 Q 66,72 0,96 Q -66,72 -66,20 L -66,-44 Z"
            fill="url(#shieldG)" stroke="#5a2000" stroke-width="5"/>
      <!-- inner white face -->
      <path d="M 0,-44 L 42,-26 L 42,12 Q 42,46 0,62 Q -42,46 -42,12 L -42,-26 Z"
            fill="white" opacity="0.88"/>
      <!-- circular refresh arrow -->
      <path d="M -20,-12 A 26,26 0 0 1 20,-12"
            fill="none" stroke="#cc4400" stroke-width="7.5" stroke-linecap="round"/>
      <polygon points="20,-12 32,-27 10,-24" fill="#cc4400"/>
      <path d="M 20,18 A 26,26 0 0 1 -20,18"
            fill="none" stroke="#cc4400" stroke-width="7.5" stroke-linecap="round"/>
      <polygon points="-20,18 -32,33 -10,30" fill="#cc4400"/>
      <!-- shield sparkle dot -->
      <circle cx="-44" cy="-32" r="8" fill="white" opacity="0.95"/>
    </g>

    <!-- ── WARRIOR BODY ── -->
    <!-- Back leg -->
    <ellipse cx="258" cy="372" rx="24" ry="56"
             fill="url(#warrior)" stroke="#5a2000" stroke-width="5"
             transform="rotate(-24,258,372)"/>
    <!-- Back boot -->
    <ellipse cx="225" cy="425" rx="36" ry="17"
             fill="url(#warrior)" stroke="#5a2000" stroke-width="5"
             transform="rotate(-8,225,425)"/>
    <!-- Left arm (shield side) -->
    <ellipse cx="232" cy="258" rx="19" ry="48"
             fill="url(#warrior)" stroke="#5a2000" stroke-width="5"
             transform="rotate(-42,232,258)"/>
    <!-- Torso -->
    <ellipse cx="291" cy="268" rx="58" ry="74"
             fill="url(#warrior)" stroke="#5a2000" stroke-width="5"/>
    <!-- Chest armour details -->
    <path d="M 271,233 L 291,306 M 311,233 L 291,306 M 264,260 Q 291,270 318,260 M 263,284 Q 291,294 319,284"
          fill="none" stroke="#c85000" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Front leg -->
    <ellipse cx="328" cy="382" rx="25" ry="56"
             fill="url(#warrior)" stroke="#5a2000" stroke-width="5"
             transform="rotate(22,328,382)"/>
    <!-- Front boot -->
    <ellipse cx="362" cy="438" rx="37" ry="17"
             fill="url(#warrior)" stroke="#5a2000" stroke-width="5"
             transform="rotate(8,362,438)"/>
    <!-- Right arm (punching) -->
    <ellipse cx="354" cy="228" rx="20" ry="51"
             fill="url(#warrior)" stroke="#5a2000" stroke-width="5"
             transform="rotate(32,354,228)"/>
    <!-- Fist -->
    <rect x="368" y="174" width="44" height="38" rx="11"
          fill="url(#warrior)" stroke="#5a2000" stroke-width="5"/>
    <!-- Shoulder pads -->
    <ellipse cx="235" cy="220" rx="30" ry="21"
             fill="url(#warrior)" stroke="#5a2000" stroke-width="5"
             transform="rotate(-12,235,220)"/>
    <ellipse cx="350" cy="214" rx="30" ry="21"
             fill="url(#warrior)" stroke="#5a2000" stroke-width="5"
             transform="rotate(12,350,214)"/>

    <!-- ── HEAD & HELMET ── -->
    <circle cx="310" cy="172" r="54"
            fill="url(#warrior)" stroke="#5a2000" stroke-width="5"/>
    <!-- Visor dark face plate -->
    <path d="M 268,164 Q 310,190 352,164 L 346,212 Q 310,228 274,212 Z"
          fill="#6a1800" opacity="0.9"/>
    <!-- Eye glow -->
    <ellipse cx="295" cy="180" rx="9.5" ry="5.5" fill="#ff3300" filter="url(#glow)"/>
    <ellipse cx="325" cy="180" rx="9.5" ry="5.5" fill="#ff3300" filter="url(#glow)"/>
    <!-- Helmet crest -->
    <rect x="300" y="122" width="23" height="52" rx="8"
          fill="url(#warrior)" stroke="#5a2000" stroke-width="4"/>

    <!-- ── CROWN ── -->
    <g filter="url(#sg)" fill="url(#gold)" stroke="#7a4000" stroke-width="3" stroke-linejoin="round">
      <rect x="262" y="90" width="110" height="36" rx="7"/>
      <polygon points="272,90 284,48 298,90"/>
      <polygon points="305,90 326,32 347,90"/>
      <polygon points="335,90 349,48 361,90"/>
    </g>
    <!-- Crown jewels -->
    <circle cx="285"  cy="74" r="7"   fill="#ff1744" stroke="#900" stroke-width="2"/>
    <circle cx="326"  cy="58" r="8"   fill="#ff1744" stroke="#900" stroke-width="2"/>
    <circle cx="347"  cy="74" r="7"   fill="#ff1744" stroke="#900" stroke-width="2"/>

    <!-- ── STARS ── -->
    <!-- Large teal star top-left -->
    <g transform="translate(96,94)" filter="url(#sg)">
      <polygon fill="#3deaea"
        points="0,-26 6.3,-8.7 24.7,-8 10.2,3.3 15.2,21 0,10.8 -15.2,21 -10.2,3.3 -24.7,-8 -6.3,-8.7"/>
    </g>
    <!-- Small teal star top-left area -->
    <g transform="translate(154,64) scale(0.58)" filter="url(#glow)">
      <polygon fill="#3deaea"
        points="0,-26 6.3,-8.7 24.7,-8 10.2,3.3 15.2,21 0,10.8 -15.2,21 -10.2,3.3 -24.7,-8 -6.3,-8.7"/>
    </g>
    <!-- Gold star top centre -->
    <g transform="translate(190,54) scale(0.70)" filter="url(#glow)">
      <polygon fill="#ffe033"
        points="0,-26 6.3,-8.7 24.7,-8 10.2,3.3 15.2,21 0,10.8 -15.2,21 -10.2,3.3 -24.7,-8 -6.3,-8.7"/>
    </g>
    <!-- Teal star top right -->
    <g transform="translate(406,74) scale(0.75)" filter="url(#sg)">
      <polygon fill="#3deaea"
        points="0,-26 6.3,-8.7 24.7,-8 10.2,3.3 15.2,21 0,10.8 -15.2,21 -10.2,3.3 -24.7,-8 -6.3,-8.7"/>
    </g>

    <!-- Sparkle dots -->
    <circle cx="130" cy="162" r="3"   fill="#80deea" opacity="0.85"/>
    <circle cx="88"  cy="296" r="2.5" fill="#4fc3f7" opacity="0.70"/>
    <circle cx="468" cy="232" r="3"   fill="#80deea" opacity="0.75"/>
    <circle cx="74"  cy="212" r="2.5" fill="#4fc3f7" opacity="0.60"/>
    <circle cx="448" cy="322" r="3"   fill="#80deea" opacity="0.65"/>
    <circle cx="172" cy="394" r="2"   fill="#4fc3f7" opacity="0.60"/>

    <!-- ── TOP-RIGHT CHEVRONS ── -->
    <g fill="none" stroke="#3deaea" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.88">
      <polyline points="440,128 460,148 480,128"/>
      <polyline points="440,152 460,172 480,152"/>
    </g>

    <!-- ── BOTTOM-RIGHT CHEVRONS ── -->
    <g fill="none" stroke="#3deaea" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.88">
      <polyline points="418,384 444,406 470,384"/>
      <polyline points="418,408 444,430 470,408"/>
    </g>

    <!-- Highlight sparkle circles -->
    <circle cx="243" cy="146" r="5" fill="white" opacity="0.88" filter="url(#glow)"/>
    <circle cx="383" cy="154" r="4" fill="white" opacity="0.80" filter="url(#glow)"/>

    <!-- 4-point diamond sparkle bottom-right -->
    <g transform="translate(458,455)" filter="url(#glow)">
      <path d="M 0,-18 L 4,-4 L 18,0 L 4,4 L 0,18 L -4,4 L -18,0 L -4,-4 Z"
            fill="white" opacity="0.88"/>
    </g>
  </g>

  <!-- Gold border (outside clip for crisp edge) -->
  <rect x="6" y="6" width="500" height="500" rx="92" ry="92"
        fill="none" stroke="url(#gold)" stroke-width="12"/>
  <!-- Inner accent ring -->
  <rect x="20" y="20" width="472" height="472" rx="80" ry="80"
        fill="none" stroke="#1a6bcc" stroke-width="2.5" opacity="0.55"/>
</svg>
